services:
  postgres:
    image: postgres:16-alpine
    container_name: lavland-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lavland
    ports:
      - '5432:5432'
    volumes:
      - lavland_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d lavland']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: lavland-backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/lavland?schema=public
      JWT_SECRET: lavland-docker-secret-change-in-production
      JWT_EXPIRES_IN: 7d
      PORT: 3000
      FRONTEND_URL: http://localhost:3001
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000/api
    container_name: lavland-frontend
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
    depends_on:
      - backend

volumes:
  lavland_pg_data:
